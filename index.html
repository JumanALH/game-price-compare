<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مقارنة أسعار الألعاب · Steam vs GOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #2d3250;
    --panel: #424769;
    --panel-2: #676f9d;
    --text: #ffffff;
    --muted: #b8bdd9;
    --accent: #f9b17a;
    --accent-soft: rgba(249, 177, 122, 0.15);
    --steam: #8ecbff;
    --gog: #c9a9ff;
    --green: #7ee0b0;
    --radius: 16px;
    --shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Raleway", sans-serif; font-weight: 400;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 26px 16px 70px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }

  header { text-align: center; margin: 14px 0 26px; }
  header h1 {
    font-weight: 800; font-size: 2rem;
    display: inline-flex; align-items: center; gap: 10px;
  }
  header h1 .dot { color: var(--accent); }
  header p { color: var(--muted); margin-top: 8px; font-weight: 500; }

  /* شريط التحكم: العملة + التبويبات */
  .controls {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    justify-content: space-between; margin-bottom: 16px;
  }
  .tabs { display: flex; gap: 8px; background: var(--panel); padding: 6px; border-radius: 14px; }
  .tab {
    border: none; cursor: pointer; font-family: inherit; font-weight: 600;
    font-size: .92rem; color: var(--muted); background: transparent;
    padding: 9px 16px; border-radius: 10px; transition: all .18s; white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #2d3250; font-weight: 700; }

  .cur-box { display: flex; align-items: center; gap: 8px; }
  .cur-box label { color: var(--muted); font-weight: 600; font-size: .9rem; }
  select {
    font-family: inherit; font-weight: 700; font-size: .92rem;
    background: var(--panel); color: var(--text); border: 2px solid var(--panel-2);
    padding: 9px 12px; border-radius: 10px; cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--accent); }

  .search {
    display: flex; gap: 10px; background: var(--panel);
    padding: 8px; border-radius: var(--radius); box-shadow: var(--shadow);
    border: 2px solid transparent; transition: border-color .2s;
  }
  .search:focus-within { border-color: var(--accent); }
  .search input {
    flex: 1; border: none; outline: none; font-family: inherit; font-weight: 500;
    font-size: 1.05rem; padding: 12px 16px; color: var(--text); background: transparent;
  }
  .search input::placeholder { color: var(--muted); }
  .search button {
    border: none; cursor: pointer; font-family: inherit; font-weight: 700;
    font-size: 1rem; color: #2d3250; background: var(--accent);
    padding: 0 28px; border-radius: 11px; transition: filter .2s, transform .1s;
  }
  .search button:hover { filter: brightness(1.06); }
  .search button:active { transform: scale(0.97); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
  .chip {
    background: var(--panel); color: var(--muted); border: 1px solid var(--panel-2);
    cursor: pointer; font-family: inherit; font-size: .85rem; font-weight: 500;
    padding: 6px 14px; border-radius: 999px; transition: all .18s;
  }
  .chip:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

  #status { text-align: center; margin: 28px 0; color: var(--muted); font-weight: 500; }
  .spinner {
    width: 34px; height: 34px; border: 4px solid var(--panel);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .note {
    text-align: center; color: var(--muted); font-size: .8rem;
    margin: 8px 0 0; font-weight: 500;
  }
  .warn { color: var(--accent); }

  /* ===== بطاقات المقارنة (وضع البحث) ===== */
  .results { margin-top: 22px; display: flex; flex-direction: column; gap: 14px; }
  .card {
    background: var(--panel); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden; border: 1px solid rgba(255,255,255,.05);
  }
  .card-top {
    display: flex; align-items: center; gap: 14px; padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .card-top img {
    width: 96px; height: 46px; object-fit: cover; border-radius: 8px;
    background: var(--bg); flex-shrink: 0;
  }
  .card-top .name { font-weight: 700; font-size: 1.05rem; line-height: 1.3; }
  .verdict {
    margin-inline-start: auto; text-align: center; padding: 8px 14px;
    border-radius: 11px; font-weight: 700; font-size: .85rem; white-space: nowrap;
  }
  .verdict.steam { background: rgba(142,203,255,.16); color: var(--steam); }
  .verdict.gog { background: rgba(201,169,255,.16); color: var(--gog); }
  .verdict.same { background: rgba(126,224,176,.16); color: var(--green); }
  .verdict small { display: block; font-weight: 500; font-size: .72rem; opacity: .9; }

  .prices { display: grid; grid-template-columns: 1fr 1px 1fr; }
  .store { padding: 16px 18px; text-align: center; position: relative; }
  .store.win::after {
    content: "الأرخص ✓"; position: absolute; top: 10px; inset-inline-end: 12px;
    font-size: .68rem; font-weight: 700; color: #2d3250;
    background: var(--green); padding: 3px 8px; border-radius: 999px;
  }
  .divider { background: rgba(255,255,255,.09); }
  .store .logo { font-weight: 800; font-size: .9rem; margin-bottom: 8px; letter-spacing: .3px; }
  .store.steam-col .logo { color: var(--steam); }
  .store.gog-col .logo { color: var(--gog); }
  .price-now { font-size: 1.5rem; font-weight: 800; }
  .price-old { color: var(--muted); text-decoration: line-through; font-size: .9rem; margin-inline-start: 6px; }
  .discount {
    display: inline-block; background: var(--accent); color: #2d3250; font-size: .72rem;
    font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-top: 6px;
  }
  .na { color: var(--muted); font-size: .95rem; padding: 8px 0; }
  .store a {
    display: inline-block; margin-top: 10px; font-size: .8rem; color: var(--accent);
    text-decoration: none; font-weight: 700;
  }
  .store a:hover { text-decoration: underline; }

  /* ===== شبكة الخصومات (وضع الخصومات) ===== */
  .grid { margin-top: 22px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .deal {
    background: var(--panel); border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,.05);
    display: flex; flex-direction: column;
  }
  .deal img { width: 100%; height: 120px; object-fit: cover; background: var(--bg); }
  .deal .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .deal .dname { font-weight: 700; font-size: .95rem; line-height: 1.3; }
  .deal .row { display: flex; align-items: center; gap: 8px; margin-top: auto; }
  .deal .big-disc {
    background: var(--accent); color: #2d3250; font-weight: 800;
    font-size: .82rem; padding: 3px 8px; border-radius: 7px;
  }
  .deal .pnow { font-weight: 800; font-size: 1.1rem; }
  .deal .pold { color: var(--muted); text-decoration: line-through; font-size: .82rem; }
  .deal a {
    color: var(--accent); text-decoration: none; font-weight: 700; font-size: .8rem; margin-top: 4px;
  }
  .deal a:hover { text-decoration: underline; }

  footer { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 44px; line-height: 1.8; font-weight: 500; }

  @media (max-width: 560px) {
    .card-top { flex-wrap: wrap; }
    .verdict { margin-inline-start: 0; width: 100%; }
    .grid { grid-template-columns: 1fr; }
    .controls { flex-direction: column-reverse; align-items: stretch; }
    .tabs { justify-content: center; }
    .cur-box { justify-content: center; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>مقارنة أسعار الألعاب <span class="dot">●</span></h1>
    <p>الأسعار الحالية على Steam مقابل GOG</p>
  </header>

  <div class="controls">
    <div class="tabs">
      <button class="tab active" data-mode="search">بحث ومقارنة</button>
      <button class="tab" data-mode="steam">أقوى خصومات Steam</button>
      <button class="tab" data-mode="gog">أقوى خصومات GOG</button>
    </div>
    <div class="cur-box">
      <label for="cur">العملة</label>
      <select id="cur">
        <option value="USD" selected>USD · دولار</option>
        <option value="EUR">EUR · يورو</option>
        <option value="GBP">GBP · جنيه</option>
        <option value="SAR">SAR · ريال</option>
        <option value="AED">AED · درهم</option>
      </select>
    </div>
  </div>

  <div id="searchArea" class="search">
    <input id="q" type="text" placeholder="اكتبي اسم اللعبة… مثال: Witcher 3" autocomplete="off" />
    <button id="go">بحث</button>
  </div>
  <div id="chips" class="chips">
    <button class="chip">The Witcher 3</button>
    <button class="chip">Cyberpunk 2077</button>
    <button class="chip">Baldur's Gate 3</button>
    <button class="chip">Hades</button>
    <button class="chip">Stardew Valley</button>
  </div>

  <div id="status"></div>
  <div id="results" class="results"></div>
  <div id="grid" class="grid"></div>

  <footer>
    الأسعار مباشرة من ستيم و GOG لحظة الطلب · أسعار GOG بغير الدولار محوّلة بسعر الصرف الحالي<br />
    أداة شخصية للمقارنة فقط
  </footer>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const curSel = $("cur");
  const statusEl = $("status");
  const resultsEl = $("results");
  const gridEl = $("grid");
  const searchArea = $("searchArea");
  const chips = $("chips");
  let mode = "search";

  const money = (n, sym, pos) =>
    n == null ? "—" : pos === "after"
      ? n.toFixed(2) + " " + sym
      : sym + n.toFixed(2);

  function setBusy(msg) {
    resultsEl.innerHTML = "";
    gridEl.innerHTML = "";
    statusEl.innerHTML = `<div class="spinner"></div>${msg}`;
  }
  function clearAll() { resultsEl.innerHTML = ""; gridEl.innerHTML = ""; statusEl.innerHTML = ""; }

  // ---------- وضع البحث ----------
  function storeHTML(kind, data, sym, pos, isWinner) {
    const label = kind === "steam" ? "Steam" : "GOG";
    if (!data) {
      return `<div class="store ${kind}-col"><div class="logo">${label}</div>
        <div class="na">غير متوفرة</div></div>`;
    }
    const old = data.base && data.discount > 0
      ? `<span class="price-old">${money(data.base, sym, pos)}</span>` : "";
    const disc = data.discount > 0
      ? `<div class="discount">خصم ${data.discount}%</div>` : "";
    return `<div class="store ${kind}-col ${isWinner ? "win" : ""}">
      <div class="logo">${label}</div>
      <div><span class="price-now">${money(data.final, sym, pos)}</span>${old}</div>
      ${disc}
      <div><a href="${data.url}" target="_blank" rel="noopener">فتح الصفحة ↗</a></div>
    </div>`;
  }
  function verdictHTML(row, sym, pos) {
    if (!row.steam || !row.gog) {
      const only = row.steam ? "Steam فقط" : "GOG فقط";
      return `<div class="verdict same">متوفرة على<br>${only}</div>`;
    }
    if (row.cheaper === "same") return `<div class="verdict same">نفس السعر</div>`;
    const who = row.cheaper === "steam" ? "Steam" : "GOG";
    return `<div class="verdict ${row.cheaper}">${who} أرخص
      <small>توفّرين ${money(row.diff, sym, pos)}</small></div>`;
  }
  function renderSearch(data) {
    const rows = data.results || [];
    if (!rows.length) { statusEl.textContent = "ما لقيت نتائج لهذي اللعبة 🎮"; return; }
    let notes = "";
    if (data.gogError) notes += `<p class="note warn">تعذّر جلب أسعار GOG الحين — النتائج تعرض ستيم فقط. جرّبي بعد شوي.</p>`;
    if (data.converted) notes += `<p class="note">أسعار GOG محوّلة من الدولار بسعر الصرف الحالي.</p>`;
    statusEl.innerHTML = notes;
    const sym = data.symbol, pos = data.pos;
    resultsEl.innerHTML = rows.map((row) => {
      const img = row.image
        ? `<img src="${row.image}" alt="" onerror="this.style.visibility='hidden'"/>` : "";
      return `<div class="card">
        <div class="card-top">${img}
          <div class="name">${row.name}</div>
          ${verdictHTML(row, sym, pos)}
        </div>
        <div class="prices">
          ${storeHTML("steam", row.steam, sym, pos, row.cheaper === "steam")}
          <div class="divider"></div>
          ${storeHTML("gog", row.gog, sym, pos, row.cheaper === "gog")}
        </div>
      </div>`;
    }).join("");
  }

  // ---------- وضع الخصومات ----------
  function renderDeals(data) {
    if (data.error) { statusEl.textContent = data.error; return; }
    const items = data.items || [];
    if (!items.length) { statusEl.textContent = "ما فيه خصومات معروضة الحين."; return; }
    let notes = "";
    if (data.converted) notes = `<p class="note">الأسعار محوّلة من الدولار بسعر الصرف الحالي.</p>`;
    statusEl.innerHTML = notes;
    const sym = data.symbol, pos = data.pos;
    gridEl.innerHTML = items.map((it) => {
      const img = it.image ? `<img src="${it.image}" alt="" onerror="this.style.display='none'"/>` : "";
      const old = it.base ? `<span class="pold">${money(it.base, sym, pos)}</span>` : "";
      return `<div class="deal">${img}
        <div class="body">
          <div class="dname">${it.name}</div>
          <div class="row">
            <span class="big-disc">-${it.discount}%</span>
            <span class="pnow">${money(it.final, sym, pos)}</span>${old}
          </div>
          <a href="${it.url}" target="_blank" rel="noopener">فتح الصفحة ↗</a>
        </div>
      </div>`;
    }).join("");
  }

  // ---------- الطلبات ----------
  async function doSearch(term) {
    const q = (term != null ? term : $("q").value).trim();
    if (!q) return;
    $("q").value = q;
    setBusy("جاري جلب الأسعار الحالية…");
    try {
      const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&cur=${curSel.value}`);
      const data = await r.json();
      clearAll();
      if (data.error) { statusEl.textContent = data.error; return; }
      renderSearch(data);
    } catch (e) { statusEl.textContent = "تعذّر الاتصال بالخادم. تأكدي إنه شغّال."; }
  }
  async function loadDeals(platform) {
    setBusy(`جاري جلب أقوى خصومات ${platform === "steam" ? "Steam" : "GOG"}…`);
    try {
      const r = await fetch(`/api/discounts?platform=${platform}&cur=${curSel.value}`);
      const data = await r.json();
      clearAll();
      renderDeals(data);
    } catch (e) { statusEl.textContent = "تعذّر الاتصال بالخادم. تأكدي إنه شغّال."; }
  }

  // ---------- التبويبات ----------
  function switchMode(m) {
    mode = m;
    document.querySelectorAll(".tab").forEach((t) =>
      t.classList.toggle("active", t.dataset.mode === m));
    const isSearch = m === "search";
    searchArea.style.display = isSearch ? "flex" : "none";
    chips.style.display = isSearch ? "flex" : "none";
    clearAll();
    if (isSearch) { statusEl.textContent = "اكتبي اسم لعبة وابدئي المقارنة 👆"; }
    else { loadDeals(m); }
  }

  // ---------- ربط الأحداث ----------
  $("go").addEventListener("click", () => doSearch());
  $("q").addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });
  document.querySelectorAll(".chip").forEach((c) =>
    c.addEventListener("click", () => doSearch(c.textContent)));
  document.querySelectorAll(".tab").forEach((t) =>
    t.addEventListener("click", () => switchMode(t.dataset.mode)));
  curSel.addEventListener("change", () => {
    if (mode === "search") { const q = $("q").value.trim(); if (q) doSearch(q); }
    else loadDeals(mode);
  });
</script>
</body>
</html>
